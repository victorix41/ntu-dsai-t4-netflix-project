[theme]
# this config.toml is a hidden file. it will be handled by Streamlit in the background
# Corporate accent color (logo red)

base = "light" # or dark theme
primaryColor = "#E50914" # Set your desired color
backgroundColor = "#eaeded9e"
secondaryBackgroundColor = "#94898967" # sidebar background
textColor = "#1C1C1C" # black text on white background
secondaryTextColor = "#D3D3D3"     # white text on black sidebar
font = "sans serif"    # limited choice of font types
borderColor = "#FFB6C1"    # widget borders
borderRadius = 4