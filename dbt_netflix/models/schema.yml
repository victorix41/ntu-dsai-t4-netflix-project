version: 2

models:
  - name: fact_showlist
    description: "Fact table for netflix show list."
    columns:
      - name: show_id
        description: "The primary key for this table"
        tests:
          - unique
          - not_null
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref("dim_showtitle")